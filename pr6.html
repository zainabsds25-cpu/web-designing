<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Academic Scholarship & Seminar Registration</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;
    500;600&display=swap" rel="stylesheet">
<style>
body{
    font-family:'Poppins', sans-serif;
    background:#f2f2f2;
    margin:0;
}
.container{
    width:650px;
    margin:auto;
    background:white;
    padding:30px;
    margin-top:40px;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}
h1{
    text-align:center;
    color:#5a3b1e;
    font-weight:600;
    letter-spacing:1px;
    margin-bottom:25px;
}
fieldset{
    margin-bottom:20px;
    padding:15px;
    border:2px solid #6b4226;
    border-radius:8px;
}
legend{
    font-weight:600;
    color:#6b4226;
    padding:0 10px;
}

label{
    display:block;
    margin-top:10px;
    font-size:14px;
}
input, select, textarea{
    width:100%;
    padding:8px;
    margin-top:5px;
    border-radius:5px;
    border:1px solid #ccc;
}
.options{
    margin-top:10px;
}

.options input{
    width:auto;
}
.buttons{
    text-align:center;
}
button{
    padding:10px 20px;
    margin:10px;
    border:none;
    background:#6b4226;
    color:white;
    border-radius:5px;
    font-size:14px;
    cursor:pointer;
}
button:hover{
    background:#a47149;
}
</style>
</head>
<body>
<div class="container">
<h1>Academic Scholarship & Seminar Registration</h1>
<form>
<!-- Personal Information -->
<fieldset>
<legend>Personal Information</legend>
<label>Full Name</label>
<input type="text" name="name" required>
<label>Email Address</label>
<input type="email" name="email">
<label>Phone Number</label>
<input type="tel" name="phone">
<label>Date of Birth</label>
<input type="date" name="dob">
<label>Address</label>
<textarea rows="3"></textarea>
</fieldset>
<!-- Academic Information -->
<fieldset>
<legend>Academic Information</legend>
<label>Course</label>
<select>
<option>Select Course</option>
<option>B.Tech</option>
<option>B.Sc</option>
<option>BCA</option>
<option>M.Tech</option>
</select>
<label>Year of Study</label>
<select>
<option>1st Year</option>
<option>2nd Year</option>
<option>3rd Year</option>
<option>4th Year</option>
</select>
<label>College Name</label>
<input type="text">
</fieldset>
<!-- Gender -->
<fieldset>
<legend>Gender</legend>
<div class="options">
<input type="radio" name="gender"> Male<br>
<input type="radio" name="gender"> Female<br>
<input type="radio" name="gender"> Other
</div>
</fieldset>
<!-- Seminar Topics -->
<fieldset>
<legend>Seminar Topics Interested In</legend>
<div class="options">
<input type="checkbox"> Artificial Intelligence<br>
<input type="checkbox"> Web Development<br>
<input type="checkbox"> Cyber Security<br>
<input type="checkbox"> Data Science<br>
<input type="checkbox"> Cloud Computing
</div>
</fieldset>
<!-- Document Upload -->
<fieldset>
<legend>Upload Documents</legend>
<label>Upload Aadhaar / ID Proof</label>
<input type="file">
<label>Upload Previous Marksheet</label>
<input type="file">
<label>Upload Resume (Optional)</label>
<input type="file">
</fieldset>
<!-- Additional Info -->
<fieldset>
<legend>Additional Information</legend>
<label>Why do you want to attend this seminar or apply for the scholarship?</label>
<textarea rows="4"></textarea>
</fieldset>
<div class="buttons">
<button type="submit">Submit</button>
<button type="reset">Reset</button>
</div>
</form>
</div>
</body>
</html>
